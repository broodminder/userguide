site_name: USER DOCUMENTATION
dev_addr: 127.0.0.1:3200

docs_dir: docs/
exclude_docs: overrides/

site_url: https://doc.mybroodminder.com
site_description : Broodminder User Guide

theme:
  name: material
  font: false
  custom_dir: docs/overrides
  icon:
    alternate: svg/language
  logo:
    assets/images/BRM.png
  features:
    - navigation.indexes
  palette:
    primary: custom

extra:
  social:
    - icon: fontawesome/solid/file-pdf
      link: /assets/pdf/userguide.pdf
      name: Version PDF

extra_css:
  - assets/css/extra.css

extra_javascript:
  - assets/javascripts/extra.js

markdown_extensions:
  - admonition
  - attr_list
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tasklist:
      clickable_checkbox: true
      custom_checkbox: true
  - pymdownx.tabbed:
      alternate_style: true

nav:
